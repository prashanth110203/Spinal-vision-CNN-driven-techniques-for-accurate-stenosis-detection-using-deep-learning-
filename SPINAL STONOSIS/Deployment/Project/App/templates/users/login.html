            background-size: cover;
        }

        #FormContainer {
            border: 2px solid rgba(255, 255, 255, 0.4);
            width: 760px;
            border-radius: 10px;
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.1);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
            align-items: center;
            height: 550px;
        }

        h1 {
            color: #34495e;
            font-size: 2rem;
            font-weight: 600;
            text-align: center;
            grid-column: span 2;
            margin-bottom: 20px;
        }

        .ImgContainer {
            border-radius: 10px;
            background: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQhbwzKhIHe_2RLw3zO9Jx1LEyTjZDz4GsM4Ptr7Isxys7BwGpIX5TKuOXeYmFupph5ejQ&usqp=CAU') no-repeat center center;
            background-size: cover;
            height: 100%;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        form .form-group {
            margin-bottom: 15px;
        }

        form label {
            font-size: 0.9rem;
            font-weight: 500;
            color: #34495e;
            margin-bottom: 5px;
        }

        form input,
        form select {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ced4da;
            background-color: #fff;
            width: 100%;
            outline: none;
            color: #495057;
            margin-bottom: 10px;
            transition: border-color 0.3s;
        }

        form input:focus,
        form select:focus {
            border-color: #007bff;
        }

        form button {
            align-self: center;
            border-radius: 5px;
            padding: 10px 20px;
            font-size: 1.1rem;
            color: #fff;
            background-color: #007bff;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }

        form button:hover {
            background-color: #0056b3;
        }

        .links {
            text-align: center;
            margin-top: 10px;
        }

        .links a {
            color: #007bff;
            text-decoration: none;
            font-weight: 500;
        }

        .links a:hover {
            text-decoration: underline;
        }

        @media (max-width: 800px) {
            .ImgContainer {
                display: none;
            }

            #FormContainer {
                grid-template-columns: 1fr;
                width: 90%;
            }
        }

        @media (max-width: 430px) {
            #FormContainer {
                width: 100%;
                border-radius: 0;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
<div id="FormContainer">
    <form method="POST">
        {% csrf_token %}
        {% if form.errors %}
            <div class="alert alert-danger alert-dismissible" role="alert">
                <div id="form_errors">
                    {% for key, value in form.errors.items %}
                        <strong style="color: darksalmon;">{{ value }}</strong>
                    {% endfor %}
                </div>
                <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
        {% endif %}
        <h1>Login</h1>
        <div class="form-group">
            <label for="username">Username</label>
            {{ form.username }}
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            {{ form.password }}
        </div>
        <button type="submit">Login</button>
        <div class="links">
            <a href="{% url 'users-register' %}">Create an Account</a>
        </div>
    </form>
    <div class="ImgContainer"></div>
</div>
</body>
</html>
