<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Database</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* General Styles */
        body {
            font-family: 'Poppins', sans-serif;
            background: url(https://images.pexels.com/photos/5793950/pexels-photo-5793950.jpeg?auto=compress&cs=tinysrgb&w=800)no-repeat;
            background-size: cover;
            color: #ffffff;
            text-align: center;
            margin: 0;
            padding: 30px;
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        h4 {
            font-size: 26px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 20px;
            color: #00eaff;
            letter-spacing: 2px;
        }

        /* Card Grid */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            justify-content: center;
            padding: 20px 0;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0, 238, 255, 0.3);
            transition: transform 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 25px rgba(0, 238, 255, 0.6);
        }

        .card img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #00eaff;
            box-shadow: 0 0 10px rgba(0, 238, 255, 0.5);
        }

        .label {
            font-size: 18px;
            font-weight: 600;
            margin-top: 10px;
            color: #ffffff;
            text-transform: uppercase;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .card-grid {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h4>Personal Informations Database</h4>

        <div class="card-grid">
            {% for model in models %}
            <div class="card">
                <img src="{{ model.image.url }}" alt="Image">
                <div class="label">{{ model.label }}</div>
            </div>
            {% endfor %}
        </div>
    </div>

</body>
</html>
